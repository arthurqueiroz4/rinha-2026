services:
  api1:
    container_name: rinha-api1
    build:
      context: ..
      dockerfile: conteinerization/Dockerfile
    environment:
      - PORT=8080
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "200MB"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3

  api2:
    container_name: rinha-api2
    build:
      context: ..
      dockerfile: conteinerization/Dockerfile
    environment:
      - PORT=8080
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "200MB"
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 3

  lb:
    image: nginx:alpine
    networks:
      - rinha
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "16MB"

networks:
  rinha:
    driver: bridge
